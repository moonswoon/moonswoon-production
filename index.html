// ── CALENDAR ──
let calYear=new Date().getFullYear(), calMonth=new Date().getMonth();

function getAllDeadlines(){
  const events=[];
  const today=new Date(); today.setHours(0,0,0,0);

  // Дропы
  D.drops.forEach(dr=>{
    if(!dr.deadline)return;
    events.push({date:dr.deadline,type:'drop',icon:'ti-garden-cart',color:'#2d6a4f',name:dr.name,sub:dr.season||'',status:stg(dr.stage).l,statusBg:stg(dr.stage).bg,statusC:stg(dr.stage).c,resp:dr.responsible||''});
  });

  // Изделия
  D.items.forEach(it=>{
    if(!it.shipDate)return;
    const dr=D.drops.find(d=>d.id==it.dropId);
    events.push({date:it.shipDate,type:'item',icon:'ti-diamond',color:'#b85450',name:it.name,sub:dr?.name||'',factory:it.factory||'',status:stg(it.stage).l,statusBg:stg(it.stage).bg,statusC:stg(it.stage).c,resp:it.responsible||''});
  });

  // Заказы
  D.orders.filter(o=>o.dateShip&&!['закрыт'].includes(o.status)).forEach(o=>{
    events.push({date:o.dateShip,type:'order',icon:'ti-clipboard-list',color:'#1a4a8a',name:'Заказ #'+(o.orderNum||o.name),sub:o.factory||'',status:o.status,statusBg:OST_C[o.status]+'22',statusC:OST_C[o.status],resp:o.responsible||''});
  });

  // Цепочки
  D.chains.filter(ch=>ch.shipDate&&ch.status!=='получены').forEach(ch=>{
    events.push({date:ch.shipDate,type:'chain',icon:'ti-link',color:'#c9972a',name:ch.name,sub:`${ch.length||''} · ${ch.qty||''}шт`,status:ch.status,statusBg:'#fdecc0',statusC:'#a06000',resp:''});
  });

  // 3D-задачи
  D.designers.forEach(des=>{
    (des.tasks||[]).filter(t=>t.deadline&&t.status!=='готово').forEach(t=>{
      events.push({date:t.deadline,type:'task',icon:'ti-3d-cube-sphere',color:'#5a3a8a',name:t.name,sub:t.item||des.name,status:t.status||'в работе',statusBg:'#e0d0f8',statusC:'#5a3a8a',resp:des.name});
    });
  });

  return events.sort((a,b)=>a.date.localeCompare(b.date));
}

function rCalendar(){
  const today=new Date(); today.setHours(0,0,0,0);
  const todayStr=today.toISOString().split('T')[0];
  const allEvents=getAllDeadlines();

  // Счётчики
  const weekStart=new Date(today); weekStart.setDate(today.getDate()-today.getDay()+1);
  const weekEnd=new Date(weekStart); weekEnd.setDate(weekStart.getDate()+6);
  const nextWeekStart=new Date(weekEnd); nextWeekStart.setDate(weekEnd.getDate()+1);
  const nextWeekEnd=new Date(nextWeekStart); nextWeekEnd.setDate(nextWeekStart.getDate()+6);
  const monthEnd=new Date(today.getFullYear(),today.getMonth()+1,0);

  const ds=s=>new Date(s+'T00:00:00');
  const cnt=(fn)=>allEvents.filter(e=>fn(ds(e.date))).length;
  const overdue=cnt(d=>d<today);
  const todayCnt=cnt(d=>d.toISOString().split('T')[0]===todayStr);
  const thisWeek=cnt(d=>d>=today&&d<=weekEnd&&d.toISOString().split('T')[0]!==todayStr);
  const nextWeek=cnt(d=>d>=nextWeekStart&&d<=nextWeekEnd);
  const thisMonth=cnt(d=>d>nextWeekEnd&&d<=monthEnd);

  // Мини-календарь
  const firstDay=new Date(calYear,calMonth,1);
  const lastDay=new Date(calYear,calMonth+1,0);
  const startDow=(firstDay.getDay()+6)%7; // пн=0
  const MONTHS=['январь','февраль','март','апрель','май','июнь','июль','август','сентябрь','октябрь','ноябрь','декабрь'];
  const MONTHS_G=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  const DOW=['пн','вт','ср','чт','пт','сб','вс'];
  const TYPE_COLORS={drop:'#2d6a4f',item:'#b85450',order:'#1a4a8a',chain:'#c9972a',task:'#5a3a8a'};

  // Собираем точки по датам
  const dotsByDate={};
  allEvents.forEach(e=>{
    if(!dotsByDate[e.date])dotsByDate[e.date]={};
    dotsByDate[e.date][e.type]=true;
  });

  let calGrid=`<div class="cal-grid">`;
  DOW.forEach(d=>{calGrid+=`<div class="cal-dow">${d}</div>`;});

  // Предыдущий месяц
  for(let i=0;i<startDow;i++){
    const d=new Date(calYear,calMonth,1-startDow+i);
    calGrid+=`<div class="cal-day cal-other-month"><span class="day-num">${d.getDate()}</span></div>`;
  }
  // Текущий месяц
  for(let d=1;d<=lastDay.getDate();d++){
    const dateStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=dateStr===todayStr;
    const dots=dotsByDate[dateStr]||{};
    const dotHtml=Object.keys(dots).map(t=>`<div class="cal-dot" style="background:${TYPE_COLORS[t]}"></div>`).join('');
    calGrid+=`<div class="cal-day${isToday?' today':''}"><span class="day-num">${d}</span>${dotHtml?`<div class="cal-dots">${dotHtml}</div>`:''}</div>`;
  }
  // Следующий месяц
  const remaining=(7-((startDow+lastDay.getDate())%7))%7;
  for(let i=1;i<=remaining;i++){calGrid+=`<div class="cal-day cal-other-month"><span class="day-num">${i}</span></div>`;}
  calGrid+='</div>';

  // Группировка дедлайнов
  const groups=[
    {key:'overdue',label:'Просрочено',icon:'ti-alert-circle',color:'#b85450',bg:'#fff5f5',filter:e=>ds(e.date)<today},
    {key:'today',label:'Сегодня',icon:'ti-sun',color:'#1a1714',bg:'#f5f2ed',filter:e=>e.date===todayStr},
    {key:'week',label:'Эта неделя',icon:'ti-calendar-week',color:'#1a4a8a',bg:'#fff',filter:e=>{const d=ds(e.date);return d>today&&d<=weekEnd}},
    {key:'nextweek',label:'Следующая неделя',icon:'ti-calendar-stats',color:'#5a3a8a',bg:'#fff',filter:e=>{const d=ds(e.date);return d>=nextWeekStart&&d<=nextWeekEnd}},
    {key:'month',label:'Этот месяц',icon:'ti-calendar',color:'#2d6a4f',bg:'#fff',filter:e=>{const d=ds(e.date);return d>nextWeekEnd&&d<=monthEnd}},
    {key:'later',label:'Позже',icon:'ti-calendar-plus',color:'#8a8278',bg:'#fff',filter:e=>ds(e.date)>monthEnd},
  ];

  const TYPE_LABELS={drop:'Дроп',item:'Изделие',order:'Заказ',chain:'Цепи',task:'Задача'};
  const TYPE_ICONS={drop:'ti-garden-cart',item:'ti-diamond',order:'ti-clipboard-list',chain:'ti-link',task:'ti-3d-cube-sphere'};

  let listHtml='<div class="deadline-list">';
  groups.forEach(g=>{
    const items=allEvents.filter(g.filter);
    if(!items.length)return;
    listHtml+=`<div>
      <div class="dl-group-title" style="color:${g.color}">
        <i class="ti ${g.icon}" style="font-size:15px"></i>${g.label}
        <span style="font-family:'DM Mono',monospace;font-size:11px;opacity:.6">${items.length}</span>
      </div>`;
    items.forEach(e=>{
      const d=ds(e.date);
      const dayNum=d.getDate();
      const mon=MONTHS_G[d.getMonth()].slice(0,3).toUpperCase();
      const initials=e.resp?e.resp.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase():'';
      listHtml+=`<div class="dl-item${g.key==='overdue'?' overdue':''}">
        <div class="dl-date">
          <div class="dl-date-d">${dayNum}</div>
          <div class="dl-date-m">${mon}</div>
        </div>
        <div class="dl-type" style="color:${TYPE_COLORS[e.type]}">
          <i class="ti ${TYPE_ICONS[e.type]}" style="font-size:12px"></i>${TYPE_LABELS[e.type]}
        </div>
        <div>
          <div class="dl-name">${e.name}</div>
          ${e.sub?`<div class="dl-sub">${e.sub}</div>`:''}
        </div>
        ${e.factory?`<span class="tag" style="font-size:9px">${e.factory}</span>`:'<span></span>'}
        <span class="tag" style="background:${e.statusBg||'#f0ece5'};color:${e.statusC||'#8a8278'};font-size:9px">${e.status}</span>
        ${initials?`<div class="dl-resp" title="${e.resp}">${initials}</div>`:`<div></div>`}
      </div>`;
    });
    listHtml+='</div>';
  });
  listHtml+='</div>';

  return `
    <div class="counter-row">
      <div class="counter-card" style="border-color:${overdue?'#b85450':'rgba(0,0,0,0.08)'}">
        <div class="counter-label">Просрочено</div>
        <div class="counter-val" style="color:${overdue?'#b85450':'#1a1714'}">${overdue}</div>
        ${overdue?`<div class="counter-sub">требует внимания</div>`:''}
      </div>
      <div class="counter-card"><div class="counter-label">Сегодня</div><div class="counter-val">${todayCnt}</div></div>
      <div class="counter-card"><div class="counter-label">Эта неделя</div><div class="counter-val">${thisWeek}</div></div>
      <div class="counter-card"><div class="counter-label">След. неделя</div><div class="counter-val">${nextWeek}</div></div>
      <div class="counter-card"><div class="counter-label">Этот месяц</div><div class="counter-val">${thisMonth}</div></div>
    </div>
    <div class="cal-wrap">
      <div>
        <div class="cal-mini">
          <div class="cal-nav">
            <button class="btn sm" onclick="calMonth--;if(calMonth<0){calMonth=11;calYear--;}render()"><i class="ti ti-chevron-left"></i></button>
            <span class="cal-month">${MONTHS[calMonth]} ${calYear} г.</span>
            <button class="btn sm" onclick="calMonth++;if(calMonth>11){calMonth=0;calYear++;}render()"><i class="ti ti-chevron-right"></i></button>
          </div>
          ${calGrid}
          <div class="cal-legend">
            <div class="cal-leg-item"><div class="cal-dot" style="background:#2d6a4f;width:8px;height:8px"></div>Дроп</div>
            <div class="cal-leg-item"><div class="cal-dot" style="background:#b85450;width:8px;height:8px"></div>Изделие</div>
            <div class="cal-leg-item"><div class="cal-dot" style="background:#1a4a8a;width:8px;height:8px"></div>Заказ</div>
            <div class="cal-leg-item"><div class="cal-dot" style="background:#c9972a;width:8px;height:8px"></div>Цепочка</div>
            <div class="cal-leg-item"><div class="cal-dot" style="background:#5a3a8a;width:8px;height:8px"></div>Задача</div>
          </div>
        </div>
      </div>
      <div>${listHtml}</div>
    </div>`;
}

// ── SKU FILE IMPORT ──
let skuPreviewData=[]; // [{artikul, name, isRing, skip}]

function handleSkuFile(file){
  if(!file)return;
  const ext=file.name.split('.').pop().toLowerCase();
  if(ext==='csv'){
    const r=new FileReader();
    r.onload=e=>parseSkuCSV(e.target.result);
    r.readAsText(file,'utf-8');
  } else if(ext==='xlsx'||ext==='xls'){
    loadXLSX(()=>{
      const r=new FileReader();
      r.onload=e=>{
        const wb=XLSX.read(e.target.result,{type:'binary'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
        parseSkuRows(rows);
      };
      r.readAsBinaryString(file);
    });
  } else {
    alert('Поддерживаются только CSV и Excel (.xlsx, .xls)');
  }
}

function loadXLSX(cb){
  if(window.XLSX){cb();return;}
  const s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  s.onload=cb;
  document.head.appendChild(s);
}

function parseSkuCSV(text){
  // Определяем разделитель
  const sep=text.includes(';')?';':',';
  const rows=text.split('\n').map(l=>l.split(sep).map(c=>c.replace(/^"|"$/g,'').trim()));
  parseSkuRows(rows);
}

function parseSkuRows(rows){
  if(!rows.length)return;
  // Ищем заголовки
  const header=rows[0].map(c=>String(c).toLowerCase());
  let artIdx=-1,nameIdx=-1;
  // Пробуем найти по ключевым словам
  header.forEach((h,i)=>{
    if(/артикул|article|sku|код/i.test(h)&&artIdx===-1)artIdx=i;
    if(/наимен|название|name|товар/i.test(h)&&nameIdx===-1)nameIdx=i;
  });
  // Если не нашли — берём первые две колонки
  const dataStart=artIdx>=0||nameIdx>=0?1:0;
  if(artIdx===-1)artIdx=0;
  if(nameIdx===-1)nameIdx=1;

  const data=rows.slice(dataStart).filter(r=>r[artIdx]&&String(r[artIdx]).trim());
  skuPreviewData=data.map(r=>{
    const art=String(r[artIdx]||'').trim();
    const nm=String(r[nameIdx]||'').trim();
    return{artikul:art,name:nm,isRing:art.startsWith('msR_'),skip:!!D.skus.find(s=>s.artikul===art)};
  });
  renderSkuPreview(artIdx,nameIdx,rows[0]||[]);
}

function parseSkuText(){
  const text=document.getElementById('sku-text')?.value||'';
  const lines=text.split('\n').filter(l=>l.trim());
  skuPreviewData=lines.map(line=>{
    const parts=line.split('|').map(x=>x.trim());
    const art=parts[0]||'';
    const nm=parts[1]||'';
    return{artikul:art,name:nm,isRing:art.startsWith('msR_'),skip:!!D.skus.find(s=>s.artikul===art)};
  }).filter(r=>r.artikul);
  renderSkuPreview(-1,-1,[]);
}

function renderSkuPreview(artIdx,nameIdx,headerRow){
  const wrap=document.getElementById('sku-preview');
  if(!wrap)return;
  if(!skuPreviewData.length){wrap.innerHTML=`<div style="color:#8a8278;font-size:11px;padding:1rem 0">Нет данных для импорта</div>`;return;}

  const newCount=skuPreviewData.filter(r=>!r.skip).length;
  const skipCount=skuPreviewData.filter(r=>r.skip).length;

  let h=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap">
    <span style="font-family:'Jost',sans-serif;font-weight:700;font-size:13px">Найдено: ${skuPreviewData.length}</span>
    <span class="tag" style="background:#c8f0d8;color:#1a6a3a">+ ${newCount} новых</span>
    ${skipCount?`<span class="tag" style="background:#f0ece5;color:#8a8278">пропустить ${skipCount} (уже есть)</span>`:''}
    <button class="btn primary sm" style="margin-left:auto" onclick="doSkuImport()"><i class="ti ti-check"></i>Импортировать ${newCount}</button>
  </div>`;

  h+=`<div style="max-height:320px;overflow-y:auto;border:0.5px solid rgba(0,0,0,0.08);border-radius:6px">
  <table style="width:100%;border-collapse:collapse">
  <thead><tr>
    <th style="font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:#8a8278;padding:6px 8px;background:#f5f2ed;border-bottom:0.5px solid rgba(0,0,0,0.08)">Артикул</th>
    <th style="font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:#8a8278;padding:6px 8px;background:#f5f2ed;border-bottom:0.5px solid rgba(0,0,0,0.08)">Наименование</th>
    <th style="font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:#8a8278;padding:6px 8px;background:#f5f2ed;border-bottom:0.5px solid rgba(0,0,0,0.08)">Тип</th>
    <th style="font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:#8a8278;padding:6px 8px;background:#f5f2ed;border-bottom:0.5px solid rgba(0,0,0,0.08)">Статус</th>
  </tr></thead><tbody>`;

  skuPreviewData.slice(0,100).forEach((r,i)=>{
    h+=`<tr style="${r.skip?'opacity:.5':''}${i%2?'background:#fafaf8':''}">
      <td style="padding:5px 8px;font-family:'Jost',sans-serif;font-weight:600;font-size:11px;border-bottom:0.5px solid rgba(0,0,0,0.04)">${r.artikul}</td>
      <td style="padding:5px 8px;font-size:11px;border-bottom:0.5px solid rgba(0,0,0,0.04)">${r.name||'—'}</td>
      <td style="padding:5px 8px;border-bottom:0.5px solid rgba(0,0,0,0.04)">
        <span style="font-size:9px;padding:2px 6px;border-radius:20px;${r.isRing?'background:#c8d8f8;color:#1a4a8a':'background:#f0ece5;color:#8a8278'}">${r.isRing?'Кольцо':'—'}</span>
      </td>
      <td style="padding:5px 8px;border-bottom:0.5px solid rgba(0,0,0,0.04)">
        ${r.skip?`<span style="font-size:9px;color:#8a8278">уже есть</span>`:`<span style="font-size:9px;color:#2d6a4f">✓ новый</span>`}
      </td>
    </tr>`;
  });
  if(skuPreviewData.length>100)h+=`<tr><td colspan="4" style="padding:8px;text-align:center;font-size:10px;color:#8a8278">... и ещё ${skuPreviewData.length-100} строк</td></tr>`;
  h+='</tbody></table></div>';
  wrap.innerHTML=h;
}

function doSkuImport(){
  let added=0;
  skuPreviewData.filter(r=>!r.skip&&r.artikul).forEach(r=>{
    D.skus.push({artikul:r.artikul,name:r.name,isRing:r.isRing});
    added++;
  });
  sv();closeM();render();
  skuPreviewData=[];
}

function exportOrdersCSV(){

  D.orders.forEach(o=>{
    (o.positions||[]).forEach(pos=>{
      (pos.sizes||[]).forEach(sz=>{
        const t=(Number(sz.site)||0)+(Number(sz.msk)||0)+(Number(sz.ec)||0)+(Number(sz.hohr)||0);
        rows.push([o.orderNum||'',o.name,o.type==='new'?'Новый':'Сток',o.factory||'',o.status,fmtDate(o.dateCreated),fmtDate(o.dateSent),fmtDate(o.dateShip),pos.artikul,pos.name||'',sz.size||'б/р',sz.site||0,sz.msk||0,sz.ec||0,sz.hohr||0,t,pos.coating||'',pos.insert||'',pos.costEst||'']);
      });
    });
  });
  const csv='\uFEFF'+rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');

}

    try{

}
